name: portable-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag
        required: true
        default: v0.15

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载已验证的 Windows 分层资产
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release download "${{ inputs.version }}"
          --pattern "*windows-x64-standard*"
          --pattern "*windows-x64-full-rag*"
          --pattern "ComfyUI-Wrapping-paper.exe"
          --dir release-assets
      - name: 生成两个用户一键包
        run: |
          python scripts/portable_release.py build --target windows-x64-standard --version "${{ inputs.version }}" --assets-dir release-assets --output-dir user-assets --work-dir .portable-work
          python scripts/portable_release.py build --target windows-x64-full-rag --version "${{ inputs.version }}" --assets-dir release-assets --output-dir user-assets --work-dir .portable-work
      - name: 上传一键包并更新下载说明
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.version }}" user-assets/*.zip --clobber
          gh release edit "${{ inputs.version }}" --notes-file RELEASE_NOTES.md
